name: Build SkillBond APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            build-essential ccache \
            libncurses5:i386 libstdc++6:i386 zlib1g:i386 \
            libncurses5-dev libffi-dev libssl-dev zlib1g-dev \
            autoconf automake libtool pkg-config \
            libltdl-dev libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev \
            libjpeg-dev libpng-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==3.0.10

      - name: Cache buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Buildozer exit code: $BUILD_EXIT"
          exit $BUILD_EXIT

      - name: Find APK location
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found anywhere"
          echo ""
          echo "=== Contents of bin/ (if exists) ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ directory does not exist"
          echo ""
          echo "=== .buildozer/android/platform/build-arm64-v8a/dists/ ==="
          ls -lh .buildozer/android/platform/build-arm64-v8a/dists/ 2>/dev/null || echo "dists not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SkillBond-debug-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log (always — for debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Show last 100 lines of log on failure
        if: failure()
        run: tail -100 build.log
